<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe AI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
    body { font-family: Arial; text-align: center; background: #f7f7f7; }
    h1 { margin-top: 20px; }
    #board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        gap: 5px;
        justify-content: center;
        margin-top: 20px;
    }
    .cell {
        width: 100px; height: 100px;
        background: white;
        border: 2px solid #333;
        font-size: 60px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        user-select: none;
    }
    .cell:hover { background: #e0e0e0; }
    #winner { font-size: 24px; margin-top: 15px; }
    button { margin-top: 15px; padding: 10px 20px; font-size: 16px; }
</style>
</head>
<body>

<h1>Tic-Tac-Toe: Human (X) vs AI (O)</h1>

<div id="board">
    {% for i in range(9) %}
        <div class="cell" data-index="{{ i }}"></div>
    {% endfor %}
</div>

<p id="winner"></p>
<button id="resetBtn">Reset</button>

<script>
const cells = document.querySelectorAll('.cell');
const winnerText = document.getElementById('winner');

function updateBoard(board) {
    cells.forEach((cell, i) => {
        cell.textContent = board[i] === ' ' ? '' : board[i];
    });
}

// Click event for cells
cells.forEach(cell => {
    cell.addEventListener('click', () => {
        const index = parseInt(cell.getAttribute('data-index'));
        if(cell.textContent !== '') return; // prevent clicking filled cells

        fetch('/move', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({index: index})
        })
        .then(res => res.json())
        .then(data => {
            updateBoard(data.board);
            if(data.winner){
                winnerText.textContent =
                    data.winner === 'Draw' ? "It's a Draw!" : data.winner + " wins!";
            }
        })
        .catch(err => console.error(err));
    });
});

// Reset button
document.getElementById('resetBtn').addEventListener('click', () => {
    fetch('/reset')
    .then(res => res.json())
    .then(data => {
        updateBoard(data.board);
        winnerText.textContent = '';
    });
});

// Initialize board on page load
fetch('/reset')
.then(res => res.json())
.then(data => updateBoard(data.board));
</script>

</body>
</html>
